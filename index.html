<body>
    <div id="statusIndicator" class="status-indicator status-disconnected">
        🔴 Connecting...
    </div>

    <div class="container">
        <!-- Login Page -->
        <div id="loginPage">
            <div class="header">
                <h1>🎓 AttendX AI</h1>
                <p>Smart Attendance System</p>
                <p style="font-size: 0.9em; margin-top: 10px;">Version 2.0 - <?php echo date('Y-m-d H:i:s'); ?></p>
            </div>

            <div class="login-box glass">
                <h2 style="margin-bottom: 20px; text-align: center;">Login</h2>
                
                <div id="loginError" class="error" style="display: none;"></div>
                <div id="loginSuccess" class="success" style="display: none;"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>User ID</label>
                        <input type="text" id="userId" placeholder="Enter user ID" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>

                    <div class="form-group">
                        <label>Role</label>
                        <select id="role">
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <button type="submit" class="btn" id="loginBtn">Login</button>
                </form>

                <div class="credentials">
                    <strong>Demo Credentials:</strong><br>
                    Student: 21CS001 / Std@C001<br>
                    Teacher: T001 / Tech@T001<br>
                    Admin: ADM001 / Adm@001
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboardPage" class="dashboard">
            <div class="header">
                <h1>Dashboard</h1>
                <button class="btn-logout" onclick="logout()">Logout</button>
                <div style="clear: both;"></div>
            </div>

            <div class="glass">
                <h2 id="welcomeMessage">Welcome!</h2>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <p>Total Students</p>
                        <h3 id="totalStudents">-</h3>
                    </div>
                    <div class="stat-card">
                        <p>Present Today</p>
                        <h3 id="presentToday">-</h3>
                    </div>
                    <div class="stat-card">
                        <p>Attendance Rate</p>
                        <h3 id="attendanceRate">-%</h3>
                    </div>
                    <div class="stat-card">
                        <p>At Risk</p>
                        <h3 id="atRisk">-</h3>
                    </div>
                </div>

                <h3 style="margin: 30px 0 15px 0;">Students</h3>
                <div id="studentsList" class="students-grid">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading students...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let currentUser = null;
        let backendConnected = false;

        // Update status indicator
        function updateStatus(connected) {
            backendConnected = connected;
            const indicator = document.getElementById('statusIndicator');
            if (connected) {
                indicator.className = 'status-indicator status-connected';
                indicator.textContent = '🟢 Connected';
            } else {
                indicator.className = 'status-indicator status-disconnected';
                indicator.textContent = '🔴 Disconnected';
            }
        }

        // Test backend connection
        async function testBackend() {
            console.log('[TEST] Testing backend connection to:', API_URL);
            try {
                const response = await fetch(`${API_URL}/health`, {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                console.log('[TEST] Response status:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('[TEST] Backend response:', data);
                    updateStatus(true);
                    return true;
                }
                throw new Error(`HTTP ${response.status}`);
            } catch (error) {
                console.error('[TEST] Backend connection failed:', error);
                updateStatus(false);
                return false;
            }
        }

        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            const loginSuccess = document.getElementById('loginSuccess');

            console.log('[LOGIN] Attempting login:', { userId, role });

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            loginError.style.display = 'none';
            loginSuccess.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    mode: 'cors',
                    cache: 'no-cache',
                    body: JSON.stringify({ user_id: userId, password, role })
                });

                console.log('[LOGIN] Response status:', response.status);

                if (!response.ok) {
                    const errorData = await response.json();
                    console.error('[LOGIN] Error:', errorData);
                    throw new Error(errorData.detail || 'Login failed');
                }

                const data = await response.json();
                console.log('[LOGIN] Success:', data);
                currentUser = data;
                
                loginSuccess.textContent = '✅ Login successful! Loading dashboard...';
                loginSuccess.style.display = 'block';
                
                setTimeout(() => {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('dashboardPage').style.display = 'block';
                    loadDashboard();
                }, 1000);

            } catch (error) {
                console.error('[LOGIN] Error:', error);
                loginError.textContent = `❌ ${error.message}. Check credentials and backend connection.`;
                loginError.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        // Load Dashboard Data
        async function loadDashboard() {
            console.log('[DASHBOARD] Loading data...');
            
            document.getElementById('welcomeMessage').textContent = 
                `Welcome, ${currentUser.profile?.name || currentUser.user_id}!`;

            try {
                // Load dashboard stats
                const statsResponse = await fetch(`${API_URL}/api/v1/analytics/dashboard`, {
                    mode: 'cors',
                    cache: 'no-cache'
                });
                
                console.log('[DASHBOARD] Stats response:', statsResponse.status);
                const stats = await statsResponse.json();
                console.log('[DASHBOARD] Stats:', stats);
                
                document.getElementById('totalStudents').textContent = stats.total_students || 0;
                document.getElementById('presentToday').textContent = stats.present_today || 0;
                document.getElementById('attendanceRate').textContent = 
                    `${Math.round(stats.today_percentage || 0)}%`;
                document.getElementById('atRisk').textContent = stats.at_risk_count || 0;

                // Load students
                const studentsResponse = await fetch(`${API_URL}/api/v1/students`, {
                    mode: 'cors',
                    cache: 'no-cache'
                });
                
                console.log('[DASHBOARD] Students response:', studentsResponse.status);
                const students = await studentsResponse.json();
                console.log('[DASHBOARD] Students count:', students.length);
                
                const studentsList = document.getElementById('studentsList');
                if (students.length === 0) {
                    studentsList.innerHTML = '<p style="text-align:center">No students registered yet</p>';
                } else {
                    studentsList.innerHTML = students.map(student => `
                        <div class="student-card">
                            <h3>${student.name}</h3>
                            <p><strong>Roll:</strong> ${student.roll_number}</p>
                            <p><strong>Semester:</strong> ${student.semester || 'N/A'}</p>
                            <p><strong>Class:</strong> ${student.class_section || 'N/A'}</p>
                            <p><strong>Attendance:</strong> ${student.attendance_percentage || 0}%</p>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('[DASHBOARD] Error:', error);
                document.getElementById('studentsList').innerHTML = 
                    '<p style="color:#e74c3c">Failed to load data. Check backend connection.</p>';
            }
        }

        // Logout
        function logout() {
            console.log('[LOGOUT] Logging out');
            currentUser = null;
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('dashboardPage').style.display = 'none';
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('loginSuccess').style.display = 'none';
            document.getElementById('loginForm').reset();
        }

        // Check backend on load
        window.addEventListener('load', async () => {
            console.log('[INIT] Page loaded - timestamp:', new Date().toISOString());
            console.log('[INIT] Testing backend connection...');
            
            const isConnected = await testBackend();
            
            if (!isConnected) {
                const loginError = document.getElementById('loginError');
                loginError.innerHTML = `
                    <strong>⚠️ Backend Not Connected</strong><br>
                    Please make sure:<br>
                    1. Backend terminal is running<br>
                    2. You see "Uvicorn running on http://0.0.0.0:8000"<br>
                    3. Then <strong>refresh this page (F5)</strong>
                `;
                loginError.style.display = 'block';
            } else {
                console.log('[INIT] ✅ Backend connected successfully!');
            }
        });

        // Periodic connection check
        setInterval(testBackend, 10000); // Check every 10 seconds
    </script>
</body>
