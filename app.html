<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendX AI - Smart Attendance System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .login-box {
            max-width: 450px;
            margin: 50px auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .dashboard {
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .stat-card h3 {
            font-size: 3em;
            margin: 10px 0;
        }

        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .student-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .success {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid rgba(0, 255, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .btn-logout {
            background: rgba(255, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
            float: right;
        }

        .credentials {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Page -->
        <div id="loginPage">
            <div class="header">
                <h1>🎓 AttendX AI</h1>
                <p>Smart Attendance System</p>
            </div>

            <div class="login-box glass">
                <h2 style="margin-bottom: 20px; text-align: center;">Login</h2>
                
                <div id="loginError" class="error" style="display: none;"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>User ID</label>
                        <input type="text" id="userId" placeholder="Enter user ID" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>

                    <div class="form-group">
                        <label>Role</label>
                        <select id="role">
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <button type="submit" class="btn">Login</button>
                </form>

                <div class="credentials">
                    <strong>Demo Credentials:</strong><br>
                    Student: 21CS001 / Std@C001<br>
                    Teacher: T001 / Tech@T001<br>
                    Admin: ADM001 / Adm@001
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboardPage" class="dashboard">
            <div class="header">
                <h1>Dashboard</h1>
                <button class="btn-logout" onclick="logout()">Logout</button>
                <div style="clear: both;"></div>
            </div>

            <div class="glass">
                <h2 id="welcomeMessage"></h2>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <p>Total Students</p>
                        <h3 id="totalStudents">0</h3>
                    </div>
                    <div class="stat-card">
                        <p>Present Today</p>
                        <h3 id="presentToday">0</h3>
                    </div>
                    <div class="stat-card">
                        <p>Attendance Rate</p>
                        <h3 id="attendanceRate">0%</h3>
                    </div>
                    <div class="stat-card">
                        <p>At Risk</p>
                        <h3 id="atRisk">0</h3>
                    </div>
                </div>

                <h3 style="margin: 30px 0 15px 0;">Students</h3>
                <div id="studentsList" class="students-grid"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let currentUser = null;

        // Test backend connection
        async function testBackend() {
            console.log('Testing backend connection...');
            try {
                const response = await fetch(`${API_URL}/health`, {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache'
                });
                console.log('Backend response:', response.status);
                const data = await response.json();
                console.log('Backend data:', data);
                return true;
            } catch (error) {
                console.error('Backend test failed:', error);
                return false;
            }
        }

        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            console.log('Attempting login:', { userId, role });

            try {
                const response = await fetch(`${API_URL}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    mode: 'cors',
                    cache: 'no-cache',
                    body: JSON.stringify({ user_id: userId, password, role })
                });

                console.log('Login response status:', response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Login error:', errorText);
                    throw new Error('Login failed');
                }

                const data = await response.json();
                console.log('Login successful:', data);
                currentUser = data;
                
                // Show dashboard
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboardPage').style.display = 'block';
                
                loadDashboard();
            } catch (error) {
                console.error('Login error:', error);
                document.getElementById('loginError').textContent = 'Invalid credentials or backend not responding. Please try again.';
                document.getElementById('loginError').style.display = 'block';
            }
        });

        // Load Dashboard Data
        async function loadDashboard() {
            document.getElementById('welcomeMessage').textContent = 
                `Welcome, ${currentUser.profile?.name || currentUser.user_id}!`;

            try {
                console.log('Loading dashboard data...');
                
                // Load dashboard stats
                const statsResponse = await fetch(`${API_URL}/api/v1/analytics/dashboard`, {
                    mode: 'cors',
                    cache: 'no-cache'
                });
                
                console.log('Dashboard response:', statsResponse.status);
                const stats = await statsResponse.json();
                console.log('Dashboard stats:', stats);
                
                document.getElementById('totalStudents').textContent = stats.total_students || 0;
                document.getElementById('presentToday').textContent = stats.present_today || 0;
                document.getElementById('attendanceRate').textContent = 
                    `${Math.round(stats.today_percentage || 0)}%`;
                document.getElementById('atRisk').textContent = stats.at_risk_count || 0;

                // Load students
                const studentsResponse = await fetch(`${API_URL}/api/v1/students`, {
                    mode: 'cors',
                    cache: 'no-cache'
                });
                
                console.log('Students response:', studentsResponse.status);
                const students = await studentsResponse.json();
                console.log('Students data:', students);
                
                const studentsList = document.getElementById('studentsList');
                studentsList.innerHTML = students.map(student => `
                    <div class="student-card">
                        <h3>${student.name}</h3>
                        <p><strong>Roll:</strong> ${student.roll_number}</p>
                        <p><strong>Semester:</strong> ${student.semester}</p>
                        <p><strong>Class:</strong> ${student.class_section}</p>
                        <p><strong>Attendance:</strong> ${student.attendance_percentage}%</p>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        // Logout
        function logout() {
            currentUser = null;
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('dashboardPage').style.display = 'none';
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('loginForm').reset();
        }

        // Check backend status on load
        window.addEventListener('load', async () => {
            console.log('Page loaded, testing backend...');
            try {
                const isConnected = await testBackend();
                if (!isConnected) {
                    alert('⚠️ Backend is not responding!\n\nPlease make sure:\n1. Backend terminal is running\n2. You see "Uvicorn running on http://0.0.0.0:8000"\n3. Then refresh this page (F5)');
                } else {
                    console.log('✅ Backend connected successfully!');
                }
            } catch (error) {
                console.error('Backend check failed:', error);
                alert('⚠️ Cannot connect to backend!\n\nError: ' + error.message + '\n\nMake sure backend is running on port 8000');
            }
        });
    </script>
</body>
</html>
